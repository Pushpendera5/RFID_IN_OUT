<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign In - Jewellery RFID</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script>
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                primary: '#1C5C1C', 
                darkBg: '#0a0a0f',
                glassBorder: 'rgba(255, 255, 255, 0.15)',
              },
              fontFamily: {
                sans: ['Inter', 'sans-serif'],
              },
              borderRadius: {
                'custom': '8px',
              },
              animation: {
                'float': 'float 6s ease-in-out infinite',
                'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              },
              keyframes: {
                float: {
                  '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                  '50%': { transform: 'translateY(-20px) rotate(1deg)' },
                }
              }
            }
          }
        }
    </script>
    <style>
        body { background-color: #0a0a0f; overflow: hidden; margin: 0; font-family: 'Inter', sans-serif; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(60px);
            background: radial-gradient(circle at 20% 30%, rgba(28, 92, 28, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); perspective: 1000px;
        }
        .btn-3d { background: linear-gradient(135deg, #1C5C1C 0%, #144014 100%);
            box-shadow: 0 4px 15px rgba(28, 92, 28, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-3d:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 25px rgba(28, 92, 28, 0.6); }
        .btn-3d:disabled { opacity: 0.6; cursor: not-allowed; }
        .brand-logo-shell {
            width: 176px;
            margin: 0 auto 1.15rem;
            padding: 0.52rem 0.85rem;
            border-radius: 0.9rem;
            border: 1px solid rgba(28, 92, 28, 0.4);
            background: linear-gradient(145deg, rgba(8, 14, 10, 0.85), rgba(22, 45, 30, 0.88));
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
        }
        .brand-logo {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.4));
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-200 p-4">
    <canvas id="bg-canvas"></canvas>
    <div class="bg-mesh"></div>

    <main class="w-full max-w-md animate-float">
        <div class="glass-card rounded-custom p-8 md:p-10 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary opacity-10 blur-3xl rounded-full"></div>
            
            <header class="text-center mb-10 relative z-10">
                <div class="brand-logo-shell">
                    <img class="brand-logo" src="/static/logo%20white.png" alt="Company Logo"/>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-white mb-2">WELCOME BACK </h1>
                <p class="text-slate-400 text-sm">Admin Panel Access</p>
            </header>

            <div id="errorMessage" class="mb-4 p-3 rounded bg-red-500/20 border border-red-500/50 text-red-200 text-sm text-center hidden">
                <i class="fa-solid fa-triangle-exclamation mr-2"></i> Login failed.
            </div>

            <form class="space-y-6 relative z-10" id="loginForm">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 ml-1" for="username">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-regular fa-user"></i>
                        </span>
                        <input class="w-full bg-white/5 border border-white/10 rounded-custom py-3.5 pl-11 pr-4 text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 text-white" 
                               id="username" placeholder="Enter your username" type="text" required/>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2 ml-1" for="password">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input class="w-full bg-white/5 border border-white/10 rounded-custom py-3.5 pl-11 pr-12 text-sm focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 text-white" 
                               id="password" placeholder="••••••••" type="password" required/>
                        <button class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500 hover:text-slate-300 transition-colors" id="toggle-password" type="button">
                            <i class="fa-regular fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button class="btn-3d w-full py-4 rounded-custom text-white font-bold text-sm uppercase tracking-widest mt-4" id="submitBtn" type="submit">
                    Sign In
                </button>
            </form>

            <footer class="mt-12 text-center text-xs text-slate-500">
                <p>Developed by: <span class="text-white font-bold tracking-tight">PUSHPENDRA SACHAN</span></p>
                <p class="mt-2 opacity-50">WAYINFOTECH SOLUTIONS </p>
            </footer>
        </div>
    </main>

    <script>
        // --- LOGIC SECTION (Your working connection) ---
        const loginForm = document.getElementById('loginForm');
        const err = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            // Animation start
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Authenticating...';
            submitBtn.disabled = true;
            err.classList.add('hidden');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'username': u, 'password': p })
                });

                if (response.ok) {
                    
                    window.location.replace("/"); 
                } else {
                    let serverMessage = 'Login failed.';
                    try {
                        const payload = await response.json();
                        if (payload && payload.detail) {
                            serverMessage = payload.detail;
                        }
                    } catch (_) {
                        // Keep generic fallback when response body is not JSON.
                    }
                    err.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> ${serverMessage}`;
                    err.classList.remove('hidden');
                    submitBtn.innerHTML = 'Sign In';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error("Login Error:", error);
                submitBtn.innerHTML = 'Sign In';
                submitBtn.disabled = false;
            }
        };

        // --- UI SECTION (Password Toggle & Canvas) ---
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        // Background Particles
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.color = Math.random() > 0.5 ? 'rgba(28, 92, 28, 0.4)' : 'rgba(59, 130, 246, 0.4)';
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }
        function init() { for (let i = 0; i < 80; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>
</body>
</html>
